<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Ti | Feliz Cumpleaños</title>
    <link rel="stylesheet" href="main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/ca12345678.js" crossorigin="anonymous"></script>
</head>
<body>

    <header class="navbar">
        <div class="logo">Para ti ♡</div>
        <nav>
            <a href="#inicio">Inicio</a>
            <a href="#sobre-ti">Sobre ti</a>
            <a href="#recuerdos">Recuerdos</a>
            <a href="#mensajes">Mensajes</a>
        </nav>
    </header>

    <section id="inicio" class="hero-premium">
        <div class="hero-text-container">
            <h1>Feliz Cumpleaños</h1>
            <p>Mi Personita Favorita ♡</p>
        </div>
    </section>

    <section id="recuerdos" class="galeria-premium">
        <div class="carrusel-container">
            <button class="carrusel-btn" id="btnIzq"><i class="fas fa-chevron-left"></i></button>
            <div class="carrusel-track-container">
                <div class="carrusel-track" id="carruselTrack">
                    <div class="carrusel-item"><img src="img/muba selfi2.jpeg" alt="Foto"></div>
                    <div class="carrusel-item"><img src="img/muba selfi5.jpeg" alt="Foto"></div>
                    <div class="carrusel-item"><img src="img/muba selfi3.jpeg" alt="Foto"></div>
                </div>
            </div>
            <button class="carrusel-btn" id="btnDer"><i class="fas fa-chevron-right"></i></button>
        </div>
    </section>

    <div class="music-player-premium">
        <button id="btnPlayPause"><i class="fas fa-play" id="icon-play"></i></button>
        <div id="progressContainer"><div id="progressBar"></div></div>
    </div>

    <audio id="audio" loop>
        <source src="cancion.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
